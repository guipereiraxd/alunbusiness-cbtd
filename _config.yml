title: "Alun Business"
description: "Transformando seu negócio para além da IA — estratégia, educação corporativa e ferramentas práticas para líderes de T&D e RH."
author: "Guilherme Luiz Pereira"
url: "https://alunbusiness.md"
baseurl: ""

theme: jekyll-theme-cayman

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - contexto
  - aprendizados
  - agentes
  - maturidade
  - boas-praticas
  - recursos
  - workshop
  - calculadora-roi
  - curso-ia
  - bancodobrasil

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "bancodobrasil"
      type: "pages"
    values:
      layout: "bancodobrasil"
