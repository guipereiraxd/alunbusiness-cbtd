<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Área do evento — pública por link direto, fora das buscas -->
  <meta name="robots" content="noindex, nofollow">
  <title>{% if page.title %}{{ page.title }} · {% endif %}Depois do Código</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Depois do Código — área pública do evento ────────────── */
    :root {
      --nav-900: #070d20;
      --nav-800: #0a1330;
      --nav-700: #0e1c47;
      --nav-600: #16265c;
      --line:    rgba(120,150,255,0.16);
      --yellow:  #f5d90a;
      --yellow-dim: rgba(245,217,10,0.10);
      --yellow-bd:  rgba(245,217,10,0.32);
      --ink-1:   #ffffff;
      --ink-2:   #b9c2da;
      --ink-3:   #7683a6;
      --font-display: 'Chakra Petch', system-ui, sans-serif;
      --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --max: 880px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      background: var(--nav-900);
      color: var(--ink-2);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chevrons { display: inline-flex; gap: 3px; }
    .chevrons i {
      width: 10px; height: 17px; display: block;
      clip-path: polygon(0 0, 60% 0, 100% 50%, 60% 100%, 0 100%, 40% 50%);
      background: var(--yellow);
    }
    .chevrons i:nth-child(2) { opacity: 0.55; }
    .chevrons i:nth-child(3) { opacity: 0.25; }

    /* Header */
    .bb-header {
      background: rgba(10,19,48,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .bb-header-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .bb-wordmark {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .bb-nav { display: flex; gap: 22px; flex-wrap: wrap; }
    .bb-nav a {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
      text-decoration: none;
      transition: color 0.15s;
    }
    .bb-nav a:hover { color: var(--ink-1); }
    .bb-nav a[aria-current="page"] { color: var(--yellow); }

    /* Content */
    .bb-main {
      flex: 1;
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 24px 72px;
    }
    .bb-eyebrow {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .bb-h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.7rem, 4.5vw, 2.6rem);
      color: var(--ink-1);
      letter-spacing: -0.01em;
      line-height: 1.12;
      margin-bottom: 14px;
    }
    .bb-h1 .y { color: var(--yellow); }
    .bb-lede {
      font-size: 1.02rem;
      color: var(--ink-2);
      max-width: 56ch;
      line-height: 1.65;
      margin-bottom: 8px;
    }
    .bb-main h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink-1);
      margin: 44px 0 18px;
    }
    .bb-main p { margin-bottom: 14px; }
    .bb-main a { color: var(--yellow); }

    /* Reading list */
    .bb-reading { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .bb-reading a {
      padding: 14px 18px; background: var(--nav-800); border: 1px solid var(--nav-600); border-radius: 10px;
      color: var(--ink-2); font-size: 0.94rem; display: flex; gap: 10px; align-items: baseline;
      text-decoration: none; transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .bb-reading a:hover { border-color: var(--yellow-bd); color: var(--ink-1); background: var(--nav-700); }
    .bb-reading a::before { content: "—"; color: var(--yellow); flex-shrink: 0; }

    /* Long-form article: numbered practices, plain lists, callouts */
    .bb-practice { margin-top: 48px; padding-top: 36px; border-top: 1px solid var(--line); }
    .bb-practice:first-of-type { margin-top: 40px; }
    .bb-practice-num { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.14em; color: var(--yellow); margin-bottom: 8px; }
    .bb-practice-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.15rem, 2.6vw, 1.5rem); color: var(--ink-1); line-height: 1.3; margin-bottom: 14px; }
    .bb-list-label { display: block; font-family: var(--font-display); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin: 18px 0 8px; }
    .bb-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
    .bb-list li { color: var(--ink-2); font-size: 0.94rem; line-height: 1.55; display: flex; gap: 10px; }
    .bb-list li::before { content: "›"; color: var(--yellow); flex-shrink: 0; }
    .bb-callout {
      margin: 22px 0; padding: 18px 22px; background: var(--nav-800); border-left: 3px solid var(--yellow);
      border-radius: 0 10px 10px 0; color: var(--ink-1); font-weight: 600; font-size: 1.02rem; line-height: 1.5;
    }
    .bb-callout.center { text-align: center; font-style: italic; }

    /* Cards */
    .bb-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; margin-top: 8px; }
    .bb-card {
      display: block; padding: 20px 22px;
      background: var(--nav-800); border: 1px solid var(--nav-600); border-radius: 14px;
      text-decoration: none; transition: border-color 0.15s, transform 0.15s;
    }
    .bb-card:hover { border-color: var(--yellow-bd); transform: translateY(-2px); }
    .bb-card-icon { font-size: 1.3rem; margin-bottom: 10px; color: var(--yellow); }
    .bb-card-title { font-family: var(--font-display); font-size: 1.02rem; font-weight: 600; color: var(--ink-1); margin-bottom: 6px; }
    .bb-card-desc { font-size: 0.86rem; color: var(--ink-3); line-height: 1.5; }

    /* Course cards */
    .bb-courses { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 8px; }
    .bb-course {
      display: flex; flex-direction: column; gap: 10px; padding: 22px 24px;
      background: var(--nav-800); border: 1px solid var(--nav-600); border-radius: 14px;
      transition: border-color 0.15s, transform 0.15s;
    }
    .bb-course:hover { border-color: var(--yellow-bd); transform: translateY(-2px); }
    .bb-course-num { font-family: var(--font-display); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; color: var(--yellow); }
    .bb-course-title { font-family: var(--font-display); font-size: 1.02rem; font-weight: 600; color: var(--ink-1); line-height: 1.32; }
    .bb-course-desc { font-size: 0.87rem; color: var(--ink-3); line-height: 1.55; flex: 1; }
    .bb-course-links { display: flex; gap: 18px; }
    .bb-course-link { align-self: flex-start; font-size: 0.82rem; font-weight: 600; color: var(--yellow); text-decoration: none; }
    .bb-course-link:hover { text-decoration: underline; }

    /* Poll results */
    .bb-poll { margin-bottom: 40px; padding: 24px 26px; background: var(--nav-800); border: 1px solid var(--nav-600); border-radius: 14px; }
    .bb-poll-prompt { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--ink-1); margin-bottom: 4px; }
    .bb-poll-meta { font-size: 0.82rem; color: var(--ink-3); margin-bottom: 18px; }
    .bb-poll-meta b { color: var(--yellow); }
    .bb-bar-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
    .bb-bar-label { color: var(--ink-2); font-size: 0.88rem; }
    .bb-bar-pct { color: var(--ink-3); font-size: 0.8rem; font-family: var(--font-display); }
    .bb-bar-track { height: 9px; background: var(--nav-700); border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
    .bb-bar-fill { height: 100%; width: 0; background: var(--nav-600); border-radius: 6px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }
    .bb-bar.top .bb-bar-fill { background: var(--yellow); }
    .bb-bar.top .bb-bar-pct { color: var(--yellow); }
    .bb-poll-offline { font-size: 0.85rem; color: #ffb020; }

    /* Schedule table */
    .bb-schedule { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .bb-slot {
      display: grid; grid-template-columns: 118px 1fr; gap: 4px 18px;
      padding: 16px 20px; border: 1px solid var(--nav-600); border-radius: 12px; background: var(--nav-800);
      align-items: baseline;
    }
    .bb-slot.break { background: transparent; border-style: dashed; opacity: 0.75; }
    .bb-slot-time { font-family: var(--font-display); font-size: 0.92rem; font-weight: 600; color: var(--yellow); }
    .bb-slot-session { font-size: 1rem; font-weight: 600; color: var(--ink-1); grid-column: 2; }
    .bb-slot-session a { color: var(--yellow); text-decoration: none; }
    .bb-slot-session a:hover { text-decoration: underline; }
    .bb-slot-speaker { grid-column: 2; font-size: 0.86rem; color: var(--ink-3); margin-top: 2px; }
    .bb-slot-pdf { grid-column: 2; margin-top: 4px; }
    .bb-slot-pdf a { font-size: 0.82rem; font-weight: 600; color: var(--yellow); text-decoration: none; }
    .bb-slot-pdf a:hover { text-decoration: underline; }
    @media (max-width: 560px) {
      .bb-slot { grid-template-columns: 1fr; }
      .bb-slot-session, .bb-slot-speaker, .bb-slot-pdf { grid-column: 1; }
    }

    /* Comment form */
    .bb-comment { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--line); }
    .bb-comment-form { display: flex; flex-direction: column; gap: 14px; max-width: 560px; margin-top: 18px; }
    .bb-comment-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .bb-comment-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 220px; }
    .bb-comment-field label { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; color: var(--ink-3); }
    .bb-comment-field input,
    .bb-comment-field textarea {
      font-family: var(--font-body); font-size: 0.95rem; color: var(--ink-1);
      background: var(--nav-800); border: 1px solid var(--nav-600); border-radius: 10px;
      padding: 12px 14px; outline: none; transition: border-color 0.15s;
    }
    .bb-comment-field input:focus,
    .bb-comment-field textarea:focus { border-color: var(--yellow-bd); }
    .bb-comment-field textarea { resize: vertical; min-height: 100px; font-family: var(--font-body); }
    .bb-comment-submit {
      align-self: flex-start; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      color: var(--nav-900); background: var(--yellow); border: none; border-radius: 10px;
      padding: 12px 24px; cursor: pointer; transition: opacity 0.15s;
    }
    .bb-comment-submit:hover { opacity: 0.9; }
    .bb-comment-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .bb-comment-status { font-size: 0.86rem; min-height: 1.2em; }
    .bb-comment-status.ok { color: #4ade80; }
    .bb-comment-status.err { color: #ffb020; }
    .bb-comment-hint { font-size: 0.78rem; color: var(--ink-3); }

    /* Footer */
    .bb-footer { border-top: 1px solid var(--line); }
    .bb-footer-inner { max-width: var(--max); margin: 0 auto; padding: 24px; }
    .bb-orgs { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
    .bb-orgs-label { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
    .bb-org-logo { width: auto; opacity: 0.92; display: block; }
    .bb-org-logo.alun  { height: 13px; }
    .bb-org-logo.unibb { height: 20px; }
    .bb-footer a { color: var(--ink-3); text-decoration: none; }
    .bb-footer a:hover { color: var(--ink-2); }

    @media (max-width: 640px) { .bb-main { padding: 36px 18px 56px; } }
  </style>
</head>
<body>

  <header class="bb-header">
    <div class="bb-header-inner">
      <a class="bb-wordmark" href="{{ '/bancodobrasil/' | relative_url }}">
        <span class="chevrons" aria-hidden="true"><i></i><i></i><i></i></span>
        Depois do Código
      </a>
      <nav class="bb-nav">
        <a href="{{ '/bancodobrasil/' | relative_url }}" {% if page.url == '/bancodobrasil/' %}aria-current="page"{% endif %}>Início</a>
        <a href="{{ '/bancodobrasil/cronograma/' | relative_url }}" {% if page.url contains '/cronograma' %}aria-current="page"{% endif %}>Cronograma</a>
        <a href="{{ '/bancodobrasil/resultados/' | relative_url }}" {% if page.url contains '/resultados' %}aria-current="page"{% endif %}>Enquete</a>
        <a href="{{ '/bancodobrasil/apresentacao/#/mapa' | relative_url }}">Mapa</a>
        <a href="{{ '/bancodobrasil/' | relative_url }}#materiais">Materiais</a>
      </nav>
    </div>
  </header>

  <main class="bb-main">
    {{ content }}
  </main>

  <footer class="bb-footer">
    <div class="bb-footer-inner">
      <div class="bb-orgs">
        <span class="bb-orgs-label">Realização</span>
        <img class="bb-org-logo alun" src="{{ '/assets/logo-alun-business.png' | relative_url }}" alt="Alun Business">
        <img class="bb-org-logo unibb" src="{{ '/bancodobrasil/assets/unibb-transp.png' | relative_url }}" alt="UniBB">
      </div>
    </div>
  </footer>

  <!-- Limpa service workers de escopo antigo (a apresentação mudou para /apresentacao/) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          if (r.scope.indexOf('/apresentacao/') === -1) r.unregister();
        });
      });
    }
  </script>

</body>
</html>
