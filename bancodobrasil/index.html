<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#070d20">
  <title>Depois do Código</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/deck.css">
</head>
<body data-view="landing">

  <!-- Circuit / ambient background -->
  <div class="bg" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <!-- App mount -->
  <main id="app" aria-live="polite"></main>

  <!-- Stage chrome -->
  <div class="chrome" data-stage-only hidden>
    <div class="progress" id="progress" aria-hidden="true"></div>
    <button class="chrome-btn" id="btnFs" title="Tela cheia (F)" aria-label="Tela cheia">⛶</button>
  </div>

  <!-- Firebase (opcional): habilita voto ao vivo; sem ele, cai no modo demo -->
  <script src="/assets/firebase-config.js" onerror="/* sem config → modo demo */"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/polls-live.js"></script>

  <script src="assets/js/render.js"></script>
  <script src="assets/js/engine.js"></script>
</body>
</html>
